# Сборка установщиков: NSIS .exe, portable .exe, MSI .msi
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        # Версия берётся из package.json (packageManager), не дублировать — иначе ERR_PNPM_BAD_PM_VERSION

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Установка зависимостей
        run: pnpm install --frozen-lockfile

      - name: WiX Toolset (нужен для MSI)
        run: choco install wixtoolset -y --no-progress

      - name: Сборка NSIS, portable и MSI
        run: pnpm run dist

      - name: Прикрепить файлы к релизу GitHub
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Артефакты workflow (если запуск без тега)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            release/*.exe
            release/*.msi
